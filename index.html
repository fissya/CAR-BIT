<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontrol CAR BIT</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #222; color: white; user-select: none; }
        .dpad { display: grid; grid-template-columns: repeat(3, 80px); grid-gap: 10px; margin-top: 50px; }
        .btn { width: 80px; height: 80px; background-color: #444; border: none; border-radius: 10px; color: white; font-size: 24px; font-weight: bold; }
        .btn:active { background-color: #666; }
        .empty { visibility: hidden; }
        .mode-container { margin-top: 30px; display: flex; gap: 20px; }
        .mode-btn { padding: 15px 30px; font-size: 16px; border: none; border-radius: 5px; color: white; cursor: pointer; }
        #btn-manual { background-color: #28a745; }
        #btn-line { background-color: #007bff; }
        #status { margin-top: 20px; color: #ffc107; }
    </style>
</head>
<body>

    <h2>CAR BIT</h2>
    <div id="status">Koneksi: Disconnected</div>

    <div class="mode-container">
        <button id="btn-manual" class="mode-btn" onclick="setMode('MODE_MANUAL')">Mode Manual</button>
        <button id="btn-line" class="mode-btn" onclick="setMode('MODE_LINE')">Mode Line Follower</button>
    </div>

    <div class="dpad">
        <div class="empty"></div>
        <button class="btn ctrl" data-cmd="F">W</button>
        <div class="empty"></div>
        <button class="btn ctrl" data-cmd="L">A</button>
        <button class="btn ctrl" data-cmd="B">S</button>
        <button class="btn ctrl" data-cmd="R">D</button>
    </div>

    <script>
        const ws = new WebSocket('ws://192.168.4.1:81');
        const statusEl = document.getElementById('status');

        ws.onopen = () => statusEl.innerText = "Koneksi: Connected";
        ws.onclose = () => statusEl.innerText = "Koneksi: Disconnected";

        function sendCommand(cmd) {
            if (ws.readyState === WebSocket.OPEN) ws.send(cmd);
        }

        function setMode(mode) {
            sendCommand(mode);
        }

        const buttons = document.querySelectorAll('.ctrl');
        buttons.forEach(btn => {
            const cmd = btn.getAttribute('data-cmd');
            // Support untuk touch screen (HP) dan klik mouse (PC)
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); sendCommand(cmd); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); sendCommand('S'); });
            btn.addEventListener('mousedown', () => sendCommand(cmd));
            btn.addEventListener('mouseup', () => sendCommand('S'));
        });
    </script>
</body>
</html>
